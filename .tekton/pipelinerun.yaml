---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: tekton-spike
  annotations:
    # The event we target as seen from the webhook payload
    # this can be an array too, i.e: [pull_request, push]
    pipelinesascode.tekton.dev/on-event: "[pull_request, push]"

    # The branch or tag we target (i.e., main, refs/tags/*)
    pipelinesascode.tekton.dev/on-target-branch: "[main]"

    # Fetch the git-clone task with a Pipelines-as-Code remote task annotation.
    # Pipelines-as-Code will inline it into the PipelineRun before execution.
    pipelinesascode.tekton.dev/task: "git-clone"

    # Use golangci-lint from Artifact Hub to test our Golang project
    pipelinesascode.tekton.dev/task-1: "golangci-lint"

    # You can add more tasks by increasing the suffix number, you can specify
    # them as array to have multiple of them.
    # browse the tasks you want to include from Artifact Hub on https://artifacthub.io/
    #
    # pipelinesascode.tekton.dev/task-2: "[curl, buildah]"

    # how many runs we want to keep attached to this event
    pipelinesascode.tekton.dev/max-keep-runs: "5"
spec:
  params:
    # The variable with brackets are special to Pipelines-as-Code
    # They will automatically be expanded with the events from GitHub.
    - name: repo_url
      value: "{{ repo_url }}"
    - name: revision
      value: "{{ revision }}"
  pipelineSpec:
    params:
      - name: repo_url
      - name: revision
    workspaces:
      - name: source
      - name: basic-auth
      - name: go-build-cache
    tasks:
      - name: fetch-repository
        taskRef:
          name: git-clone
        workspaces:
          - name: output
            workspace: source
          - name: basic-auth
            workspace: basic-auth
        params:
          - name: url
            value: $(params.repo_url)
          - name: revision
            value: $(params.revision)
      - name: golangci-lint
        taskRef:
          name: golangci-lint
        runAfter:
          - fetch-repository
        params:
          - name: package
            value: .
        workspaces:
          - name: source
            workspace: source
      - name: build-binary
        runAfter:
          - golangci-lint
        taskSpec:
          workspaces:
            - name: source
            - name: go-build-cache
          steps:
            - name: go-build
              image: golang:1.26
              workingDir: $(workspaces.source.path)
              env:
                - name: GOCACHE
                  value: $(workspaces.go-build-cache.path)/go-build
                - name: GOMODCACHE
                  value: $(workspaces.go-build-cache.path)/go-mod
              script: |
                #!/bin/sh
                set -eu
                go build -o bin/tekton-spike .
        workspaces:
          - name: source
            workspace: source
          - name: go-build-cache
            workspace: go-build-cache

  workspaces:
    # `source` and `go-build-cache` are bound to the SAME pre-created PVC
    # (see go-build-cache-pvc.yaml), split via subPath. Tekton's affinity
    # assistant rejects a TaskRun that binds two *different* PVC-backed
    # workspaces at once ("more than one PersistentVolumeClaim is bound"),
    # so using one claim for both avoids that limitation while still giving
    # the build task a warm Go build/module cache across runs. The tradeoff:
    # source checkouts persist on disk between runs instead of starting from
    # an empty volume, which is harmless since git-clone overwrites it fresh
    # every time.
    - name: source
      persistentVolumeClaim:
        claimName: go-build-cache
      subPath: src
    # This workspace will inject secret to help the git-clone task to be able to
    # checkout the private repositories
    - name: basic-auth
      secret:
        secretName: "{{ git_auth_secret }}"
    - name: go-build-cache
      persistentVolumeClaim:
        claimName: go-build-cache
      subPath: cache
